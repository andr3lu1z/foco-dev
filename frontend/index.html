<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foco-Dev | Minhas Metas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎯 Foco-Dev</h1>
        <p>Seu rastreador de hábitos e estudos para manter o foco.</p>
    </header>
    
    <main>
        <section class="card-formulario">
            <form id="form-metas">
                <input type="text" id="input-nova-meta" placeholder="Qual a sua meta de hoje?" required>
                <button type="submit">Salvar Meta</button>
            </form>
        </section>

        <section class="area-metas">
            <h2>Trilhas Recentes</h2>
            <ul id="lista-metas">
                </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
